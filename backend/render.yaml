# Render Blueprint — deploy with one click after pushing to GitHub.
# Docs: https://render.com/docs/blueprint-spec
#
# After deploy, set the secret env vars in the Render dashboard:
#   RESEND_API_KEY  — from secrets.env
#   ADMIN_TOKEN     — generate with: python -c "import secrets;print(secrets.token_urlsafe(32))"
#
# CORS_ORIGINS is set here to the production domain. Add staging URLs
# (comma-separated) if you preview from a different host.

services:
  - type: web
    name: proreadyengineer-training-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: proreadyengineer-db
          property: connectionString
      - key: COURSE_CAPACITY
        value: "15"
      - key: COURSE_CODE
        value: gas-turbine-emissions-mapping-2026-05
      - key: COHORT_LABEL
        value: "May 15, 2026"
      - key: EMAIL_FROM
        value: "ProReadyEngineer <info@proreadyengineer.com>"
      - key: EMAIL_REPLY_TO
        value: info@proreadyengineer.com
      - key: ADMIN_NOTIFY_EMAIL
        value: bmsabry@gmail.com
      - key: PAYMENT_INSTRUCTIONS
        value: "We'll send a Stripe Payment Link and a PayPal invoice to this email address within 24 hours. Your seat is held as pending until payment clears."
      - key: COURSE_PRICE_DISPLAY
        value: ""  # set this once price is finalized, e.g. "$1,950 USD"
      - key: CORS_ORIGINS
        value: "https://proreadyengineer.com,https://www.proreadyengineer.com"
      # Secrets — set in dashboard, NOT here:
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false

databases:
  - name: proreadyengineer-db
    plan: free
    databaseName: proready
    user: proready
    region: oregon
